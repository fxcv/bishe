# 如果 Hugging Face 模型仓库是私有的，请填写只读 token。
# 公有模型仓库可以删除或留空 HF_TOKEN。
HF_TOKEN = ""

[model_repos]
# 每个仓库根目录应直接包含 config.json、model.safetensors、tokenizer.json 等文件。
bert = "your-hf-name/bishe-bert-weibo"
macbert = "your-hf-name/bishe-macbert-weibo"
roberta = "your-hf-name/bishe-roberta-weibo"
bert_bigru = "your-hf-name/bishe-bert-bigru-weibo"
bert_lora = "your-hf-name/bishe-bert-lora-weibo"

# 可选：如果不配置，应用会使用 Hugging Face 公共的 bert-base-chinese 作为底座模型。
# base_bert = "your-hf-name/base-bert-base-chinese"
